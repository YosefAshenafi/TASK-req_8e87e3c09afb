name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No actions/setup-node — the CI runner only needs Docker (pre-installed on GitHub-hosted runners).

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: docker compose run --rm lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build test image
        run: docker compose build test
      - name: Run tests
        run: docker compose run --rm test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build e2e prod
      - name: Run e2e tests
        run: docker compose run --rm e2e

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production bundle
        run: docker compose run --rm build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
