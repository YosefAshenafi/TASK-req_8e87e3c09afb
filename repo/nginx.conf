server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Angular router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed JS/CSS/fonts/images
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # No-cache for Service Worker manifest and index.html
    location ~* (index\.html|ngsw\.json|ngsw-worker\.js|safety-worker\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
